services:
  - type: web
    name: hmarepanditji-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm i -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter db exec prisma generate && pnpm --filter db build && pnpm --filter api build
    # W6 finding: prod DB never received new tables (ShishyaExchange,
    # FeedbackUnanswered) — telemetry silently dropped. db push is
    # idempotent + refuses lossy changes; guarded so boot never blocks.
    startCommand: (pnpm --filter db exec prisma db push --skip-generate || true) && pnpm --filter api start
    healthCheckPath: /health
    envVars:
      # D4: TTS speaking pace (0.5–2.0; default 1.15). sync:false — set the
      # value in the Render dashboard, and mirror it on Vercel for apps/pandit.
      - key: SARVAM_TTS_PACE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      # OTP HARDENING v2 (2026-07-23): the static bypass is DEAD. These MUST be
      # "false" for the cutover — with real delivery below, they ship together
      # or the API fatal-boots (env.ts prod guard). This is the exact value that
      # kept 9876500050/123456 logging into prod; flipping it is the cutover.
      - key: OTP_DEV_MODE
        value: "false"
      - key: MOCK_OTP
        value: "false"
      # Real OTP delivery — set the real secrets in the Render dashboard.
      # env.ts fatal-boots prod if AUTH_KEY or either TEMPLATE_ID is missing.
      - key: MSG91_AUTH_KEY
        sync: false
      - key: MSG91_SENDER_ID
        sync: false
      - key: MSG91_OTP_TEMPLATE_ID_PANDIT
        sync: false
      - key: MSG91_OTP_TEMPLATE_ID_WEB
        sync: false
      # WebOTP binding origins — BARE HOST (env.ts fatal-boots on unset/malformed).
      - key: WEBOTP_ORIGIN_PANDIT
        sync: false
      - key: WEBOTP_ORIGIN_WEB
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_TTS_SPEAKER
        sync: false
      - key: SHISHYA_LLM_MODEL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: NODE_VERSION
        value: "20"
