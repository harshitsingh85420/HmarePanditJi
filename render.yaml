services:
  - type: web
    name: hmarepanditji-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm i -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter db exec prisma generate && pnpm --filter db build && pnpm --filter api build
    # W6 finding: prod DB never received new tables (ShishyaExchange,
    # FeedbackUnanswered) — telemetry silently dropped. db push is
    # idempotent + refuses lossy changes; guarded so boot never blocks.
    startCommand: (pnpm --filter db exec prisma db push --skip-generate || true) && pnpm --filter api start
    healthCheckPath: /health
    envVars:
      # D4: TTS speaking pace (0.5–2.0; default 1.15). sync:false — set the
      # value in the Render dashboard, and mirror it on Vercel for apps/pandit.
      - key: SARVAM_TTS_PACE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OTP_DEV_MODE
        value: "true"
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_TTS_SPEAKER
        sync: false
      - key: SHISHYA_LLM_MODEL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: NODE_VERSION
        value: "20"
