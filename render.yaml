services:
  - type: web
    name: hmarepanditji-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm i -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter db exec prisma generate && pnpm --filter db build && pnpm --filter api build
    startCommand: pnpm --filter api start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OTP_DEV_MODE
        value: "true"
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: NODE_VERSION
        value: "20"
