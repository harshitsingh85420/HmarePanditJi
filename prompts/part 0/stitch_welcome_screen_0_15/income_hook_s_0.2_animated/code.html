<!DOCTYPE html>

<html lang="hi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tutorial Screen - Income Hook</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="animations">
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
    @keyframes pulse-soft {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .animate-pulse-soft {
      animation: pulse-soft 2s ease-in-out infinite;
    }
    /* Staggered animation delays for grid items */
    .delay-1 { animation-delay: 0s; }
    .delay-2 { animation-delay: 0.5s; }
    .delay-3 { animation-delay: 1s; }
    .delay-4 { animation-delay: 1.5s; }
  </style>
<style data-purpose="custom-layout">
    body {
      background-color: #FFFBF5;
      font-family: sans-serif;
      color: #2D1B00;
      overflow-x: hidden;
    }
    .saffron-border-left {
      border-left: 5px solid #F09942;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- BEGIN: TopNavigation -->
<nav class="flex justify-between items-center p-6 w-full">
<!-- Progress Dots -->
<div class="flex space-x-1.5" data-purpose="progress-dots">
<span class="w-2.5 h-2.5 rounded-full bg-[#F09942]"></span>
<span class="w-2.5 h-2.5 rounded-full bg-[#F09942]"></span>
<span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
<span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
<span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
<span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
<span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
<span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
<span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
<span class="w-2.5 h-2.5 rounded-full bg-gray-300"></span>
</div>
<!-- Skip Button -->
<button class="text-[#6B4F2A] font-semibold text-lg" data-purpose="skip-button">Skip</button>
</nav>
<!-- END: TopNavigation -->
<!-- BEGIN: MainContent -->
<main class="flex-grow flex flex-col px-6">
<!-- Title Section -->
<section class="mt-4 mb-8" data-purpose="title-section">
<h1 class="text-[26px] font-[700] text-[#2D1B00] leading-tight">
        आपकी कमाई कैसे बढ़ेगी?
      </h1>
</section>
<!-- BEGIN: HeroCard (Testimonial) -->
<section class="bg-white rounded-2xl shadow-lg p-5 saffron-border-left relative overflow-hidden" data-purpose="income-testimonial">
<!-- Profile Header -->
<div class="flex items-center space-x-3 mb-6">
<div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center overflow-hidden">
<!-- Placeholder for Pandit Avatar -->
<img alt="Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSo_KYSZRJeR5u1TGHZfoolrxzas4w5huWmkX2bvViEsWqkblH4QEQS05ELhpvXJtxPKaYTfcnAhJOfQn9EupsUiBevBKDbPXlUsiNjmDRKqgFe6C12Pqj4zhh2v2roR8Qnz4VzGqMefYfurZg2fHGDpSWYlbZ5RegbZa3K3CtIdAT8e_byFvqmlc2g1eGNcq2eoBz-V4zxJFFZ8z_h_c5Nljl1R7ZHRPZtUE7V6yWQR2RzpgIC5EBZ-C88DkKHi7raXqXEgY3soQ8"/>
</div>
<div>
<h3 class="font-bold text-[#2D1B00]">पंडित रामेश्वर शर्मा</h3>
<p class="text-sm text-gray-500">वाराणसी, UP</p>
</div>
</div>
<!-- Income Comparison -->
<div class="flex justify-between items-end mb-4">
<div>
<p class="text-sm text-gray-500 mb-1">पहले:</p>
<span class="text-lg text-gray-400 line-through">₹18,000</span>
</div>
<div class="text-right">
<p class="text-sm text-gray-500 mb-1">अब:</p>
<span class="text-3xl font-bold text-[#15803D] block animate-pulse-soft">₹63,000</span>
</div>
</div>
<!-- Verified Badge -->
<div class="inline-flex items-center px-3 py-1 bg-green-50 border border-green-200 rounded-full">
<span class="text-green-600 text-xs font-bold">✓ HmarePanditJi Verified</span>
</div>
</section>
<!-- END: HeroCard -->
<!-- BEGIN: GridSection -->
<section class="mt-10" data-purpose="ways-to-earn">
<h2 class="text-[20px] font-[600] text-[#6B4F2A] mb-6">
        3 नए तरीकों से यह हुआ:
      </h2>
<div class="grid grid-cols-2 gap-4">
<!-- Grid Item 1 -->
<div class="bg-white p-4 rounded-xl shadow-sm border border-orange-50 flex flex-col items-center justify-center animate-float delay-1" data-purpose="grid-item">
<div class="w-12 h-12 bg-orange-50 rounded-full flex items-center justify-center mb-2">
<svg class="w-6 h-6 text-orange-500" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<p class="text-sm font-bold text-center">Offline Pooja</p>
</div>
<!-- Grid Item 2 -->
<div class="bg-white p-4 rounded-xl shadow-sm border border-orange-50 flex flex-col items-center justify-center relative animate-float delay-2" data-purpose="grid-item">
<span class="absolute -top-2 -right-1 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">NEW</span>
<div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center mb-2">
<svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<p class="text-sm font-bold text-center">Online Pooja</p>
</div>
<!-- Grid Item 3 -->
<div class="bg-white p-4 rounded-xl shadow-sm border border-orange-50 flex flex-col items-center justify-center relative animate-float delay-3" data-purpose="grid-item">
<span class="absolute -top-2 -right-1 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">NEW</span>
<div class="w-12 h-12 bg-purple-50 rounded-full flex items-center justify-center mb-2">
<svg class="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 14l9-5-9-5-9 5 9 5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<p class="text-sm font-bold text-center">Consultancy</p>
</div>
<!-- Grid Item 4 -->
<div class="bg-white p-4 rounded-xl shadow-sm border border-orange-50 flex flex-col items-center justify-center relative animate-float delay-4" data-purpose="grid-item">
<span class="absolute -top-2 -right-1 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">NEW</span>
<div class="w-12 h-12 bg-green-50 rounded-full flex items-center justify-center mb-2">
<svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<p class="text-sm font-bold text-center">Backup Pandit</p>
</div>
</div>
</section>
<!-- END: GridSection -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: FooterCTA -->
<footer class="p-6" data-purpose="primary-cta-container">
<button class="w-full h-16 bg-[#F09942] rounded-2xl flex items-center justify-center text-white text-[22px] font-bold shadow-lg active:scale-95 transition-transform" data-purpose="cta-button">
      और देखें →
    </button>
</footer>
<!-- END: FooterCTA -->
</body></html>
