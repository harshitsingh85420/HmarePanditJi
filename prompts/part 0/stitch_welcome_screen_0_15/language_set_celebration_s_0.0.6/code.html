<!DOCTYPE html>

<html lang="hi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HmarePanditJi - Language Confirmation</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: External Scripts -->
<!-- BEGIN: Custom Styling -->
<style data-purpose="layout-and-background">
    body {
      margin: 0;
      padding: 0;
      width: 390px;
      height: 844px;
      overflow: hidden;
      background-color: #FFFBF5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Soft radial glow of #F09942 at 8% opacity */
    .radial-glow {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(240, 153, 66, 0.08) 0%, rgba(240, 153, 66, 0) 70%);
      pointer-events: none;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      position: relative;
    }
  </style>
<style data-purpose="animations">
    /* Circle Draw Animation */
    @keyframes drawCircle {
      to { stroke-dashoffset: 0; }
    }

    /* Checkmark Draw Animation */
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    /* Text Fade-in with Blur-to-Focus */
    @keyframes blurFadeIn {
      0% {
        opacity: 0;
        filter: blur(8px);
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
      }
    }

    /* Confetti Floating Animation */
    @keyframes floatDown {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(200px) rotate(360deg);
        opacity: 0;
      }
    }

    .animate-circle {
      stroke-dasharray: 252; /* Approx circumference for 40px radius */
      stroke-dashoffset: 252;
      animation: drawCircle 0.8s ease-out forwards;
    }

    .animate-check {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawCheck 0.5s ease-out 0.8s forwards;
    }

    .animate-text {
      opacity: 0;
      animation: blurFadeIn 1s ease-out 1.2s forwards;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      animation: floatDown linear infinite;
    }
  </style>
<!-- END: Custom Styling -->
</head>
<body class="flex items-center justify-center">
<!-- BEGIN: Radial Background Overlay -->
<div class="radial-glow" data-purpose="background-lighting"></div>
<!-- END: Radial Background Overlay -->
<!-- BEGIN: Main Celebration Content -->
<main class="main-container px-8">
<!-- BEGIN: Animated Checkmark Section -->
<div class="relative w-20 h-20 mb-10" data-purpose="success-icon-container">
<svg fill="none" height="80" viewbox="0 0 80 80" width="80" xmlns="http://www.w3.org/2000/svg">
<!-- Circle Stroke -->
<circle class="animate-circle" cx="40" cy="40" r="38" stroke="#10B981" stroke-width="4"></circle>
<!-- Checkmark Path -->
<path class="animate-check" d="M24 40L35 51L56 30" stroke="#10B981" stroke-linecap="round" stroke-linejoin="round" stroke-width="5"></path>
</svg>
<!-- BEGIN: Confetti Petals -->
<!-- Manually positioned around the checkmark -->
<div class="absolute inset-0 pointer-events-none" id="confetti-container"></div>
<!-- END: Confetti Petals -->
</div>
<!-- END: Animated Checkmark Section -->
<!-- BEGIN: Text Content -->
<div class="animate-text">
<h1 class="text-[40px] font-bold text-[#2D1B00] mb-6 leading-tight">
        बहुत अच्छा!
      </h1>
<p class="text-[22px] text-[#6B4F2A] leading-relaxed">
        अब हम आपसे हिंदी में बात करेंगे।
      </p>
</div>
<!-- END: Text Content -->
</main>
<!-- END: Main Celebration Content -->
<!-- BEGIN: Interactivity Script -->
<script data-purpose="confetti-generator">
    /**
     * Generates scattered confetti shapes around the center icon
     * Shapes: Circles and Rectangles
     * Colors: Saffron (#F09942), Gold (#FFD700), White (#FFFFFF), Success Green (#10B981)
     */
    function createConfetti() {
      const container = document.getElementById('confetti-container');
      const colors = ['#F09942', '#FFD700', '#FFFFFF', '#10B981'];
      const shapes = ['rounded-full', '']; // circle or rectangle
      
      for (let i = 0; i < 20; i++) {
        const confetti = document.createElement('div');
        const size = Math.random() * 6 + 4;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        
        confetti.className = `confetti absolute ${shape}`;
        confetti.style.width = `${size}px`;
        confetti.style.height = `${size}px`;
        confetti.style.backgroundColor = color;
        
        // Positioning in a burst pattern
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * 80 + 40;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        
        confetti.style.left = `calc(50% + ${x}px)`;
        confetti.style.top = `calc(50% + ${y}px)`;
        
        // Randomize animation duration and delay
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confetti.style.animationDelay = (Math.random() * 1.5) + 's';
        
        container.appendChild(confetti);
      }
    }

    // Initialize confetti on load
    window.addEventListener('load', createConfetti);
  </script>
<!-- END: Interactivity Script -->
</body></html>
