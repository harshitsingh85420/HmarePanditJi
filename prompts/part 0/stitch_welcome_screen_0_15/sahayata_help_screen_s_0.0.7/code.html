<!DOCTYPE html>

<html lang="hi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sahayata Help Screen - HmarePanditJi</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Hind -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="base-typography">
    body {
      font-family: 'Hind', sans-serif;
      background-color: #FFFBF5;
      color: #2D1B00;
    }
  </style>
<style data-purpose="animations">
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">
<!-- BEGIN: Header Section -->
<header class="w-full max-w-md flex justify-between items-center mb-8" data-purpose="screen-header">
<span class="text-xs font-medium opacity-50">S-0.0.7</span>
<h1 class="text-lg font-semibold text-[#2D1B00]">Sahayata Help Screen</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- END: Header Section -->
<!-- BEGIN: Main Content -->
<main class="w-full max-w-md flex flex-col items-center text-center space-y-6" data-purpose="help-content">
<!-- Illustration Placeholder -->
<div class="w-64 h-64 flex items-center justify-center bg-orange-50 rounded-full mb-2" data-purpose="illustration-container">
<!-- Representing Pandit and Support Agent Interaction -->
<img alt="दोस्ताना बातचीत का चित्रण" class="w-full h-auto object-contain mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLUYKykcK1xnmken2dZLoeC3wF4bEi6hos1Jw7SqBHlZFDhs1AxmPPf8y709NIbdHHEFIP_9IG2TCG5e5vEOvOO0MyoC7GM2f_NE44q3HKJ2wUTIRbCUfB8IFbBXoiL9eLmeC7iq0VqO8A2LGfhWCNaADVWXDt37qUntToMNC6hBmJG7GmLSSo-uPbOmXnfPu1_URaTMsvZ1O90GEimghDUye6rKYuf1BQtKJrUXNAS-MzrptqEYBas2i3aApXcbG-iilEBJIGMyhZ"/>
</div>
<!-- Reassuring Headline & Subtext -->
<div class="space-y-2 animate-fade-in">
<h2 class="text-[32px] font-bold leading-tight" style="color: #2D1B00;">
        कोई बात नहीं।
      </h2>
<p class="text-xl font-medium opacity-80">
        हम मदद के लिए यहाँ हैं।
      </p>
<p class="text-sm italic opacity-60 mt-1">
        "You are not alone"
      </p>
</div>
<!-- BEGIN: Help Cards Section -->
<section class="w-full space-y-4 pt-4" data-purpose="action-cards">
<!-- Phone Call Card -->
<a class="flex items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-orange-100 active:scale-95 transition-transform" data-purpose="phone-call-card" href="tel:+">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full flex items-center justify-center" style="background-color: #FEEEDD;">
<svg class="h-6 w-6" fill="none" stroke="currentColor" style="color: #F09942;" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<span class="text-lg font-semibold" style="color: #2D1B00;">हमारी Team से बात करें</span>
</div>
<div class="text-[#F09942]">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</a>

<a class="flex items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-green-50 active:scale-95 transition-transform" data-purpose="whatsapp-card" href="https://wa.me/">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full flex items-center justify-center bg-green-50">
<svg class="h-8 w-8" fill="currentColor" style="color: #25D366;" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

</svg>
</div>
<span class="text-lg font-semibold" style="color: #2D1B00;">WhatsApp पर लिखें</span>
</div>
<div class="text-[#25D366]">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
</a>
</section>
<!-- END: Help Cards Section -->
<!-- Availability Note -->
<div class="mt-8 text-center" data-purpose="availability">
<p class="text-sm font-medium opacity-70">
        सहायता उपलब्ध: <span class="font-bold">सुबह 8 बजे – रात 10 बजे</span>
</p>
</div>
</main>
<!-- END: Main Content -->
<!-- BEGIN: Footer Actions -->
<footer class="mt-auto py-8 w-full max-w-md text-center" data-purpose="bottom-link">
<a class="inline-block text-[#F09942] font-semibold border-b-2 border-orange-200 pb-0.5 hover:border-orange-500 transition-colors" href="#">
      वापस जाएं / खुद करें
    </a>
