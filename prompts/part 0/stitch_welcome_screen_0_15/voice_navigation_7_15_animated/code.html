<!DOCTYPE html>

<html lang="hi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f09f42",
                        "background-light": "#FFFBF5",
                        "background-dark": "#221a10",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Voice Navigation Demo</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header / Progress Bar Section -->
<header class="w-full px-4 pt-6 pb-2">
<div class="flex items-center justify-between mb-4">
<button class="flex items-center justify-center size-10 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex-1 px-4">
<div class="flex justify-between items-center mb-1">
<span class="text-xs font-semibold text-primary uppercase tracking-wider">प्रशिक्षण प्रगति</span>
<span class="text-xs font-bold text-slate-500">7/15</span>
</div>
<div class="w-full bg-slate-200 dark:bg-slate-700 h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full w-[46%]"></div>
</div>
</div>
<button class="text-primary font-bold text-sm">Skip</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center px-6 py-4">
<!-- Headline -->
<h1 class="text-3xl font-bold text-center mt-2 mb-2 leading-tight">
            टाइपिंग की ज़रूरत नहीं।
        </h1>
<p class="text-slate-600 dark:text-slate-400 text-center text-lg mb-8">
            बोलकर खोजें और नेविगेट करें
        </p>
<!-- Demo Interaction Box (Hero) -->
<div class="w-full max-w-sm aspect-square relative flex flex-col items-center justify-center border-4 border-dashed border-primary/40 rounded-xl bg-white dark:bg-slate-800/50 shadow-sm mb-8 overflow-hidden">
<!-- Success Feedback Pill -->
<div class="absolute top-6 flex items-center gap-2 bg-green-100 border border-green-200 text-green-700 px-4 py-2 rounded-full shadow-sm">
<span class="material-symbols-outlined text-sm font-bold">check_circle</span>
<span class="font-bold text-sm uppercase">शाबाश! बिल्कुल सही!</span>
</div>
<!-- Visual Illustration: Phone & Sound Waves -->
<div class="relative flex items-center justify-center">
<!-- Pulsing Rings (Visual Representation) -->
<div class="absolute inset-0 rounded-full bg-primary/20 scale-150"></div>
<div class="absolute inset-0 rounded-full bg-primary/10 scale-[2] opacity-50"></div>
<!-- Large Saffron Mic Icon -->
<div class="relative z-10 size-24 bg-primary rounded-full flex items-center justify-center text-white shadow-lg shadow-primary/40">
<span class="material-symbols-outlined text-5xl font-bold fill-1">mic</span>
</div>
</div>
<!-- Voice Status Label -->
<div class="mt-12 text-center">
<p class="text-primary font-bold animate-pulse">सुन रहा हूँ...</p>
<p class="text-slate-400 text-xs mt-1">"निकटतम एटीएम कहाँ है?"</p>
</div>
</div>
<!-- Secondary Controls -->
<div class="w-full flex justify-center gap-4 mb-8">
<button class="flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-medium border border-slate-200 dark:border-slate-700">
<span class="material-symbols-outlined">keyboard</span>
<span>कीबोर्ड इस्तेमाल करें</span>
</button>
</div>
<!-- CTA Button -->
<div class="w-full mt-auto pb-8">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 text-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                अगला फ़ायदा देखें
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar (Persistent Chrome) -->
<nav class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-4 pb-6 pt-2 flex justify-between items-center">
<a class="flex flex-col items-center gap-1 flex-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">होम</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1 text-slate-400" href="#">
<span class="material-symbols-outlined">search</span>
<span class="text-[10px] font-medium">खोजें</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">mic</span>
<span class="text-[10px] font-bold">वॉइस</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1 text-slate-400" href="#">
<span class="material-symbols-outlined">bookmark</span>
<span class="text-[10px] font-medium">बुकमार्क</span>
</a>
<a class="flex flex-col items-center gap-1 flex-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">प्रोफ़ाइल</span>
</a>
</nav>
</body></html>
