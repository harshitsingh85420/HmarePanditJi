<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    @keyframes gentle-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes bar-grow {
      0%, 100% { height: 8px; }
      50% { height: 24px; }
    }
    .animate-glow { animation: pulse-glow 3s ease-in-out infinite; }
    .animate-float { animation: gentle-float 4s ease-in-out infinite; }
    .voice-bar { animation: bar-grow 1.2s ease-in-out infinite; }
    .voice-bar:nth-child(2) { animation-delay: 0.2s; }
    .voice-bar:nth-child(3) { animation-delay: 0.4s; }
  </style>
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap');
