<!DOCTYPE html>

<html lang="hi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tutorial S-0.3 - Fixed Dakshina</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- END: External Scripts -->
<style data-purpose="custom-config">
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap');
    
    body {
      font-family: 'Noto Sans Devanagari', sans-serif;
      background-color: #FFFBF5;
      color: #2D1B00;
    }

    .transition-container {
      transition: transform 0.3s ease-in-out;
    }

    .cta-button {
      background-color: #F09942;
      box-shadow: 0 4px 14px rgba(240, 153, 66, 0.4);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
<!-- BEGIN: Top Navigation -->
<nav class="flex justify-between items-center px-6 pt-6 pb-2" data-purpose="header-nav">
<div class="flex gap-1.5" data-purpose="progress-dots">
<span class="text-[#F09942]">●●●</span><span class="text-[#D1C9BC]">○○○○○○○○○</span>
</div>
<button class="text-gray-500 font-medium text-sm">Skip</button>
</nav>
<!-- END: Top Navigation -->
<!-- BEGIN: Main Content -->
<main class="flex-grow flex flex-col items-center px-6 pt-4 text-center">
<!-- Headline Section -->
<section class="mb-8" data-purpose="headline">
<h1 class="text-[34px] font-[700] leading-tight text-[#2D1B00]">
        अब कोई मोलभाव नहीं।
      </h1>
</section>
<!-- Illustration Section -->
<section class="relative w-full max-w-[280px] mb-8" data-purpose="main-illustration">
<div class="flex justify-center items-center gap-4 py-4">
<!-- Money Hand -->
<div class="text-4xl">💵🤝</div>
<!-- Stop/No Gesture -->
<div class="relative">
<div class="text-5xl">✋</div>
<div class="absolute inset-0 flex items-center justify-center">
<span class="text-6xl text-red-600 font-bold opacity-80">✕</span>
</div>
</div>
</div>
</section>
<!-- Contrast Cards Section -->
<section class="w-full space-y-4 mb-8" data-purpose="comparison-cards">
<!-- BEFORE Card (Red Tint) -->
<article class="bg-[#FEE2E2] rounded-2xl p-4 border border-red-100 shadow-sm" data-purpose="before-state">
<header class="flex items-center gap-2 mb-3">
<span class="font-bold text-red-700">❌ पहले:</span>
</header>
<div class="flex flex-col gap-2 text-left">
<div class="flex items-start gap-2">
<span class="text-xl">😒</span>
<div class="bg-white px-3 py-1.5 rounded-lg rounded-tl-none shadow-sm text-sm">
              "1,500 में हो जाएगा?"
            </div>
</div>
<div class="flex items-start gap-2 self-end flex-row-reverse">
<span class="text-xl">😔</span>
<div class="bg-gray-50 px-3 py-1.5 rounded-lg rounded-tr-none shadow-sm text-sm italic">
              "..."
            </div>
</div>
</div>
</article>
<!-- AFTER Card (Green Tint) -->
<article class="bg-[#DCFCE7] rounded-2xl p-4 border border-green-100 shadow-sm" data-purpose="after-state">
<header class="flex items-center gap-2 mb-3">
<span class="font-bold text-green-700">✅ अब:</span>
</header>
<div class="bg-white rounded-xl p-3 text-left border border-green-200">
<div class="flex justify-between items-center mb-1">
<span class="font-bold text-gray-800">सत्यनारायण पूजा</span>
</div>
<div class="text-green-700 font-bold text-lg">
            आपकी दक्षिणा: ₹2,100
          </div>
<div class="text-xs text-gray-500">
            (पहले से तय)
          </div>
</div>
<footer class="mt-2 text-sm font-medium text-green-800">
          ग्राहक को Booking से पहले ही पता है।
        </footer>
</article>
</section>
<!-- Reassurance Footer -->
<section class="mb-10" data-purpose="trust-message">
<p class="text-gray-600 leading-relaxed">
        आप दक्षिणा खुद तय करते हैं।<br/>
<span class="font-bold text-[#2D1B00]">Platform कभी नहीं बदलेगी।</span>
</p>
</section>
</main>
<!-- END: Main Content -->
<!-- BEGIN: Fixed Footer CTA -->
<footer class="p-6 pb-10" data-purpose="footer-action">
<button class="cta-button w-full h-[64px] rounded-full text-white text-xl font-bold flex items-center justify-center gap-2 transition-transform active:scale-95">
      अगला फ़ायदा देखें 
      <span class="text-2xl">→</span>
</button>
</footer>
<!-- END: Fixed Footer CTA -->
</body></html>
