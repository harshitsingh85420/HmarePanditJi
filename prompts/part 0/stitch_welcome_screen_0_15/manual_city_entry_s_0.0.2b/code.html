<!DOCTYPE html>

<html lang="hi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HmarePanditJi - Select City</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'hpj-bg': '#FFFBF5',
            'hpj-saffron': '#F09942',
            'hpj-brown': '#2D1B00',
            'hpj-muted': '#9B7B52',
            'hpj-border': '#F0E6D3',
            'hpj-accent': '#FEF3C7',
          },
          animation: {
            'pulse-ring': 'pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'wave': 'wave 1s ease-in-out infinite',
            'glide-in': 'glide-in 0.5s ease-out forwards',
          },
          keyframes: {
            'pulse-ring': {
              '0%': { transform: 'scale(0.8)', opacity: '0.8' },
              '100%': { transform: 'scale(1.5)', opacity: '0' },
            },
            'wave': {
              '0%, 100%': { height: '8px' },
              '50%': { height: '24px' },
            },
            'glide-in': {
              '0%': { transform: 'translateX(20px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }
    
    /* Hide scrollbar for clean horizontal scroll */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-hpj-bg text-hpj-brown font-sans antialiased selection:bg-hpj-accent">
<!-- BEGIN: Main Container (Mobile Screen 390x844 approx) -->
<main class="relative mx-auto min-h-screen max-w-[390px] flex flex-col overflow-hidden bg-hpj-bg shadow-xl">
<!-- BEGIN: Top Bar -->
<header class="flex items-center justify-between px-4 py-4" data-purpose="header">
<div class="flex items-center gap-2">
<button aria-label="Go back" class="p-1">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m15 18-6-6 6-6"></path></svg>
</button>
<div class="flex items-center gap-1 font-bold text-lg">
<span class="text-hpj-saffron">ॐ</span>
<span>HmarePanditJi</span>
</div>
</div>
<button aria-label="Language" class="p-1">
<svg class="text-hpj-muted" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20"></path><path d="M2 12h20"></path></svg>
</button>
</header>
<!-- END: Top Bar -->
<!-- BEGIN: Content Area -->
<section class="flex-grow px-6 pt-4 flex flex-col gap-8">
<!-- Reassurance and Title -->
<div class="text-center space-y-1">
<p class="text-[22px] text-hpj-muted font-medium">कोई बात नहीं।</p>
<h1 class="text-[32px] font-bold leading-tight">अपना शहर बताइए</h1>
</div>
<!-- BEGIN: Voice Input Box -->
<div class="relative bg-hpj-accent border-2 border-hpj-saffron rounded-[16px] p-5 flex items-center gap-4 cursor-pointer overflow-hidden shadow-sm" data-purpose="voice-input-card">
<!-- Animated Mic Icon Section -->
<div class="relative flex items-center justify-center w-12 h-12">
<!-- Pulse Rings -->
<div class="absolute inset-0 bg-hpj-saffron rounded-full animate-pulse-ring"></div>
<div class="absolute inset-0 bg-hpj-saffron rounded-full animate-pulse-ring delay-200"></div>
<!-- Mic Background -->
<div class="relative bg-hpj-saffron rounded-full p-2.5 z-10">
<svg fill="none" height="24" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
</div>
</div>
<!-- Text Stack -->
<div class="flex flex-col">
<span class="text-[20px] font-bold">अपना शहर बोलें</span>
<span class="text-[16px] text-hpj-muted">जैसे: 'वाराणसी' या 'दिल्ली'</span>
</div>
</div>
<!-- END: Voice Input Box -->
<!-- BEGIN: Divider -->
<div class="flex items-center gap-4 text-sm font-medium text-hpj-muted/60" data-purpose="section-divider">
<div class="h-[1px] flex-grow bg-hpj-border"></div>
<span>या नीचे से चुनें</span>
<div class="h-[1px] flex-grow bg-hpj-border"></div>
</div>
<!-- END: Divider -->
<!-- BEGIN: Text Search Bar -->
<div class="relative bg-white border border-hpj-border rounded-xl px-4 py-3.5 flex items-center gap-3 shadow-sm" data-purpose="search-bar">
<svg fill="none" height="20" stroke="#9B7B52" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
<span class="text-[18px] text-hpj-muted">अपना शहर लिखें...</span>
</div>
<!-- END: Text Search Bar -->
<!-- BEGIN: Popular Cities -->
<div class="space-y-4 overflow-hidden" data-purpose="popular-cities-section">
<h2 class="text-[16px] font-semibold text-[#6B4F2A]">लोकप्रिय शहर</h2>
<!-- Row 1 -->
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
<div class="animate-glide-in delay-100 flex gap-2">
<button class="whitespace-nowrap px-6 py-2 bg-white border border-hpj-saffron text-hpj-saffron rounded-full font-medium">दिल्ली</button>
<button class="whitespace-nowrap px-6 py-2 bg-white border border-hpj-saffron text-hpj-saffron rounded-full font-medium">वाराणसी</button>
<button class="whitespace-nowrap px-6 py-2 bg-white border border-hpj-saffron text-hpj-saffron rounded-full font-medium">पटना</button>
<button class="whitespace-nowrap px-6 py-2 bg-white border border-hpj-saffron text-hpj-saffron rounded-full font-medium">लखनऊ</button>
</div>
</div>
<!-- Row 2 -->
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
<div class="animate-glide-in delay-200 flex gap-2 ml-4">
<button class="whitespace-nowrap px-6 py-2 bg-white border border-hpj-saffron text-hpj-saffron rounded-full font-medium">मुंबई</button>
<button class="whitespace-nowrap px-6 py-2 bg-white border border-hpj-saffron text-hpj-saffron rounded-full font-medium">जयपुर</button>
<button class="whitespace-nowrap px-6 py-2 bg-white border border-hpj-saffron text-hpj-saffron rounded-full font-medium">कोलकाता</button>
<button class="whitespace-nowrap px-6 py-2 bg-white border border-hpj-saffron text-hpj-saffron rounded-full font-medium">हरिद्वार</button>
<button class="whitespace-nowrap px-6 py-2 bg-white border border-hpj-saffron text-hpj-saffron rounded-full font-medium">उज्जैन</button>
</div>
</div>
</div>
<!-- END: Popular Cities -->
</section>
<!-- END: Content Area -->
<!-- BEGIN: Voice Status & Keyboard Toggle -->
<footer class="mt-auto px-6 pb-8 flex items-end justify-between" data-purpose="footer-controls">
<!-- Voice Activity Indicator -->
<div class="flex items-center gap-3">
<div class="flex items-end gap-1 h-6">
<div class="w-1.5 bg-hpj-saffron rounded-full animate-wave delay-100"></div>
<div class="w-1.5 bg-hpj-saffron rounded-full animate-wave delay-300 h-full"></div>
<div class="w-1.5 bg-hpj-saffron rounded-full animate-wave delay-200"></div>
</div>
<span class="text-hpj-saffron font-medium">सुन रहा हूँ...</span>
</div>
<!-- Keyboard Toggle -->
<button aria-label="Toggle keyboard" class="p-3 bg-white rounded-full shadow-md border border-hpj-border">
<svg fill="none" height="24" stroke="#2D1B00" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><rect height="16" rx="2" width="20" x="2" y="4"></rect><path d="M6 8h.01"></path><path d="M10 8h.01"></path><path d="M14 8h.01"></path><path d="M18 8h.01"></path><path d="M8 12h.01"></path><path d="M12 12h.01"></path><path d="M16 12h.01"></path><path d="M7 16h10"></path></svg>
</button>
</footer>
<!-- END: Voice Status & Keyboard Toggle -->
</main>
<!-- END: Main Container -->
</body></html>
