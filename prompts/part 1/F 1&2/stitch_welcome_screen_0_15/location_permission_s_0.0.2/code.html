<style>
        body {

            color: #1b1c19;

<div class="h-8 w-8 rounded-full bg-surface-container-high flex items-center justify-center">

<div class="absolute w-64 h-64 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="relative w-full h-full flex items-center justify-center">

<div class="absolute pulse-ring w-24 h-24 border-2 border-primary-container rounded-full" style="animation-delay: 0.5s;"></div>
<!-- Saffron Pin -->
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-primary-container text-5xl drop-shadow-lg" style="font-variation-settings: 'FILL' 1;">location_on</span>
<div class="w-2 h-1 bg-on-background/10 rounded-full blur-[1px] mt-1"></div>
</div>
</div>
</div>
</div>
</div>
<!-- Content Section -->
<div class="space-y-8">
<div class="text-center">
<h1 class="font-headline text-3xl font-bold text-on-background leading-tight mb-4">
                    आपका शहर जानना क्यों ज़रूरी है?
                </h1>
<!-- Privacy Pill -->
<div class="inline-flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full border border-outline-variant/20 shadow-sm">
<span class="material-symbols-outlined text-on-surface-variant text-base">lock</span>
<span class="text-on-surface-variant font-medium text-sm">आपका पूरा पता कभी नहीं दिखेगा</span>
</div>
</div>
<!-- Benefit Rows -->
<div class="space-y-6 pt-2">
<!-- Row 1 -->
<div class="flex items-start gap-5">
<div class="flex-shrink-0 w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-primary font-bold text-lg">check</span>
</div>
<p class="text-[18px] font-medium text-on-surface leading-snug pt-1">
                        आपकी भाषा खुद सेट हो जाएगी
                    </p>
</div>
<!-- Row 2 -->
<div class="flex items-start gap-5">
<div class="flex-shrink-0 w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-primary font-bold text-lg">check</span>
</div>
<p class="text-[18px] font-medium text-on-surface leading-snug pt-1">
                        आपके शहर की पूजाएं मिलेंगी
                    </p>
</div>
<!-- Row 3 -->
<div class="flex items-start gap-5">
<div class="flex-shrink-0 w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-primary font-bold text-lg">check</span>
</div>
<p class="text-[18px] font-medium text-on-surface leading-snug pt-1">
                        ग्राहक आपको ढूंढ पाएंगे
                    </p>
</div>
</div>
</div>

<div class="mt-auto pt-12 flex flex-col gap-4">
<button class="w-full h-14 bg-gradient-to-b from-primary-container to-tertiary-container text-on-primary font-bold text-lg rounded-xl shadow-[0px_8px_24px_rgba(144,77,0,0.15)] active:scale-95 transition-transform flex items-center justify-center gap-2">

<button class="w-full py-4 text-on-surface-variant font-medium text-base hover:bg-surface-container-low rounded-lg transition-colors">
                छोड़ें — हाथ से भरूँगा

</div>
