<div class="bg-secondary-container/30 border-l-4 border-secondary px-4 py-3 rounded-r-xl flex items-center gap-3">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<p class="font-devanagari text-on-secondary-container font-medium text-lg leading-tight">
                    OTP bhej diya gaya
                </p>
</div>
</div>
<!-- Content Section -->
<div class="flex-1">
<h1 class="font-headline text-3xl font-bold text-primary mb-2">Pramaanan</h1>
<p class="font-devanagari text-on-surface-variant text-lg leading-relaxed mb-8">
                Kripya aapke mobile number par bheja gaya 6-digit ka code yahan bharein.
            </p>
<!-- OTP Card -->
<div class="bg-surface-container-lowest rounded-[2rem] p-8 otp-shadow border border-outline-variant/10">
<div class="grid grid-cols-6 gap-2 sm:gap-3 mb-8">
<!-- OTP Input Boxes -->
<div class="aspect-square bg-surface-container-low border-b-2 border-outline-variant/30 rounded-xl flex items-center justify-center focus-within:border-primary-container focus-within:bg-white transition-all duration-300">
<input autofocus="" class="w-full h-full bg-transparent border-none text-center text-2xl font-bold text-primary focus:ring-0" maxlength="1" type="text" value="5"/>
</div>
<div class="aspect-square bg-surface-container-low border-b-2 border-outline-variant/30 rounded-xl flex items-center justify-center focus-within:border-primary-container focus-within:bg-white transition-all duration-300">
<input class="w-full h-full bg-transparent border-none text-center text-2xl font-bold text-primary focus:ring-0" maxlength="1" type="text" value="8"/>
</div>
<div class="aspect-square bg-surface-container-low border-b-2 border-outline-variant/30 rounded-xl flex items-center justify-center focus-within:border-primary-container focus-within:bg-white transition-all duration-300">
<input class="w-full h-full bg-transparent border-none text-center text-2xl font-bold text-primary focus:ring-0" maxlength="1" type="text"/>

</div>
<div class="aspect-square bg-surface-container-low border-b-2 border-outline-variant/30 rounded-xl flex items-center justify-center focus-within:border-primary-container focus-within:bg-white transition-all duration-300">
<input class="w-full h-full bg-transparent border-none text-center text-2xl font-bold text-primary focus:ring-0" maxlength="1" type="text"/>
</div>
<div class="aspect-square bg-surface-container-low border-b-2 border-outline-variant/30 rounded-xl flex items-center justify-center focus-within:border-primary-container focus-within:bg-white transition-all duration-300">
<input class="w-full h-full bg-transparent border-none text-center text-2xl font-bold text-primary focus:ring-0" maxlength="1" type="text"/>
</div>
</div>
<!-- Timer -->
<div class="flex items-center justify-center gap-2 mb-6">
<span class="material-symbols-outlined text-tertiary-container animate-pulse" style="font-variation-settings: 'wght' 300;">schedule</span>
<span class="text-tertiary font-bold font-body tracking-wider text-xl">00:45</span>
</div>
<!-- Action Links -->
<div class="flex flex-col gap-4 items-center">
<button class="flex items-center gap-2 text-stone-400 font-medium cursor-not-allowed" disabled="">
<span class="material-symbols-outlined text-xl">sms</span>
<span class="font-devanagari">Resend SMS</span>
</button>
<div class="h-px w-12 bg-surface-container-highest"></div>
<button class="flex items-center gap-2 text-primary font-semibold hover:bg-primary-container/10 px-4 py-2 rounded-full transition-colors">
<span class="material-symbols-outlined text-xl">call</span>
<span class="font-devanagari">Call for OTP</span>
</button>
</div>
</div>
<!-- Confirmation Button -->
<button class="w-full h-14 bg-gradient-to-b from-primary to-tertiary text-white font-headline font-bold text-lg rounded-xl mt-12 ambient-glow active:scale-95 transition-transform">

<span class="text-sm font-label">Voice</span>
</button>
