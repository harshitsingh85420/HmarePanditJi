<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">

<main class="flex-grow flex flex-col items-center justify-center px-6 py-10 bg-sacred-gradient">

<div class="relative inline-block mb-8">
<!-- Decorative Diya-like Glow behind icon -->
<div class="absolute inset-0 bg-primary-container/20 blur-3xl rounded-full scale-150"></div>
<!-- Illustrated Keyboard Representation -->
<div class="relative bg-surface-container-lowest p-8 rounded-3xl ashirwad-glow border-l-4 border-primary inline-flex flex-col items-center gap-4">
<div class="grid grid-cols-3 gap-3">
<div class="w-14 h-14 bg-surface-container rounded-xl flex items-center justify-center text-2xl font-devanagari text-primary-container font-bold border border-outline-variant/20">क</div>
<div class="w-14 h-14 bg-surface-container rounded-xl flex items-center justify-center text-2xl font-devanagari text-primary-container font-bold border border-outline-variant/20">ख</div>
<div class="w-14 h-14 bg-surface-container rounded-xl flex items-center justify-center text-2xl font-devanagari text-primary-container font-bold border border-outline-variant/20">ग</div>
</div>
<span class="material-symbols-outlined text-5xl text-primary" style="font-variation-settings: 'FILL' 1;">keyboard</span>
</div>
</div>
<h1 class="font-headline text-4xl font-bold text-on-primary-container mb-4">कोई बात नहीं! 🙏</h1>

</div>
<!-- Equivalence Demo: Voice = Keyboard = Success -->
<div class="w-full max-w-lg grid grid-cols-1 md:grid-cols-3 items-center gap-6 mb-12">
<!-- Voice Track -->
<div class="flex flex-col items-center p-6 bg-surface-container-low rounded-2xl opacity-60 grayscale">
<span class="material-symbols-outlined text-3xl mb-2 text-on-surface-variant">mic_off</span>
<p class="text-sm font-medium text-on-surface-variant">बोलकर</p>
</div>
<!-- Connector (Hidden on Mobile, shown on Web) -->
<div class="hidden md:flex flex-col items-center">
<span class="material-symbols-outlined text-primary/40">horizontal_rule</span>
</div>
<!-- Keyboard Track (Active Focus) -->
<div class="flex flex-col items-center p-6 bg-surface-container-lowest rounded-2xl ashirwad-glow border-l-4 border-primary">
<span class="material-symbols-outlined text-3xl mb-2 text-primary" style="font-variation-settings: 'FILL' 1;">keyboard</span>
<p class="text-sm font-bold text-primary">लिखकर</p>
</div>
</div>
<!-- Reassuring Message -->
<div class="text-center mb-10 max-w-xs">
<div class="flex items-center justify-center gap-2 text-secondary mb-2">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<p class="font-bold text-lg">Same result.</p>
</div>
<p class="text-secondary/80 font-medium">Sirf tarika alag hai.</p>
</div>

<div class="w-full max-w-md space-y-4">
<button class="w-full h-14 bg-gradient-to-b from-primary-container to-tertiary-container text-on-primary-fixed font-bold text-lg rounded-xl shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
                Type Karke Registration Shuru Karein
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full h-14 bg-surface-variant/30 text-on-surface-variant font-medium text-base rounded-xl flex items-center justify-center gap-2 hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-xl">settings</span>
                Permission Dobara Check Karein
            </button>
</div>

<div class="flex gap-4">
<div class="w-2 h-2 rounded-full bg-primary"></div>

<div class="w-2 h-2 rounded-full bg-primary"></div>
