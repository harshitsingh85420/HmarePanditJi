<!DOCTYPE html>

<html class="light" lang="hi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&amp;family=Noto+Sans+Devanagari:wght@400;500;700&amp;family=Public+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error-container": "#93000a",
              "primary-container": "#ff8c00",
              "background": "#fbf9f3",
              "on-secondary-fixed-variant": "#005312",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#88d982",
              "on-error": "#ffffff",
              "tertiary-fixed": "#ffdcbf",
              "inverse-primary": "#ffb77d",
              "primary-fixed": "#ffdcc3",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#ffb874",
              "surface-bright": "#fbf9f3",
              "on-primary-container": "#623200",
              "on-tertiary-fixed-variant": "#6a3b00",
              "on-primary-fixed-variant": "#6e3900",
              "secondary-container": "#a0f399",
              "on-secondary-fixed": "#002204",
              "surface-container": "#f0eee8",
              "error": "#ba1a1a",
              "tertiary": "#8c5000",
              "surface": "#fbf9f3",
              "on-tertiary-container": "#5f3400",
              "primary": "#904d00",
              "on-primary-fixed": "#2f1500",
              "secondary": "#1b6d24",
              "on-secondary-container": "#217128",
              "on-background": "#1b1c19",
              "on-surface-variant": "#564334",
              "surface-dim": "#dbdad4",
              "surface-container-highest": "#e4e2dd",
              "outline": "#897362",
              "on-surface": "#1b1c19",
              "on-secondary": "#ffffff",
              "inverse-surface": "#30312d"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Noto Sans Devanagari", "Public Sans"],
              "label": ["Public Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .waveform-bar {
            width: 8px;
            border-radius: 4px;
            background: linear-gradient(to top, #904d00, #ff8c00);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body">
<!-- Active Listening Overlay -->
<!-- Voice State V-02: Full-screen rgba(255,248,225,0.92) transparent saffron tint -->
<div class="fixed inset-0 z-[100] bg-[#fff8e1eb] backdrop-blur-md flex flex-col items-center justify-between py-12 px-6 overflow-hidden">
<!-- Top Status (Optional branding/exit) -->
<div class="w-full flex justify-end">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="close">close</span>
</button>
</div>
<!-- HERO: Sound Waveform Section -->
<div class="flex flex-col items-center gap-10 w-full max-w-md">
<!-- 7-bar vertical sound waveform -->
<div class="flex items-end justify-center gap-3 h-32">
<div class="waveform-bar h-12"></div>
<div class="waveform-bar h-20"></div>
<div class="waveform-bar h-28"></div>
<div class="waveform-bar h-16"></div>
<div class="waveform-bar h-24"></div>
<div class="waveform-bar h-10"></div>
<div class="waveform-bar h-14"></div>
</div>
<div class="text-center">
<h1 class="font-headline text-primary text-[22px] font-bold leading-relaxed mb-2">
                    सुन रहा हूँ... 🎙️
                </h1>
<p class="text-on-surface-variant text-lg">कृपया बोलिये</p>
</div>
</div>
<!-- CONTEXT CARD: White card showing current question -->
<div class="w-full max-w-sm">
<div class="bg-surface-container-lowest rounded-2xl p-8 shadow-[0px_8px_24px_rgba(144,77,0,0.08)] border-l-4 border-primary">
<p class="text-sm font-bold text-primary mb-2 tracking-wide uppercase">वर्तमान प्रश्न</p>
<h2 class="text-xl font-medium text-on-surface leading-snug">
                    Aapka mobile number kya hai?
                </h2>
</div>
</div>
<!-- Bottom Controls & Status Indicators -->
<div class="w-full flex items-center justify-between mt-8 relative">
<!-- NOISE METER: Bottom-left, signal bars -->
<div class="flex flex-col items-start gap-1">
<div class="flex items-end gap-1">
<div class="w-1.5 h-2 bg-secondary rounded-full"></div>
<div class="w-1.5 h-4 bg-secondary rounded-full"></div>
<div class="w-1.5 h-3 bg-secondary rounded-full"></div>
<div class="w-1.5 h-1 bg-outline-variant rounded-full"></div>
</div>
<span class="text-[10px] font-bold text-secondary uppercase tracking-tighter">Signal</span>
</div>
<!-- KEYBOARD ESCAPE: "⌨️ Type karna chahta hoon" (centered bottom) -->
<button class="absolute left-1/2 -translate-x-1/2 flex items-center gap-2 px-6 py-3 bg-surface-container-high hover:bg-surface-variant rounded-full transition-all active:scale-95 border border-outline-variant/30">
<span class="material-symbols-outlined text-primary text-xl" data-icon="keyboard">keyboard</span>
<span class="text-on-surface font-medium">Type karna chahta hoon</span>
</button>
<!-- TIMER: Bottom-right countdown ring "12" -->
<div class="flex items-center justify-center relative w-12 h-12">
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-surface-variant" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-width="3"></circle>
<circle class="text-primary" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-dasharray="125.6" stroke-dashoffset="30" stroke-width="3"></circle>
</svg>
<span class="text-primary font-bold text-sm">12</span>
</div>
</div>
</div>
<!-- Main Content Underlay (Blurred Content) -->
<div class="min-h-screen p-5 opacity-40 select-none pointer-events-none">
<!-- TopAppBar Predicted Component -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-[#fbf9f3] shadow-[0px_8px_24px_rgba(144,77,0,0.08)]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="person">person</span>
</div>
<span class="text-[#904d00] font-['Noto_Serif'] text-xl font-bold">सुप्रभातम</span>
</div>
<span class="material-symbols-outlined text-[#904d00]" data-icon="notifications">notifications</span>
</header>
<main class="pt-24 pb-32 space-y-8">
<div class="bg-surface-container-low p-8 rounded-2xl border-l-4 border-primary">
<h3 class="font-headline text-2xl text-on-surface mb-4">आज की पूजा</h3>
<div class="space-y-4">
<div class="h-20 bg-surface-container-lowest rounded-xl"></div>
<div class="h-20 bg-surface-container-lowest rounded-xl"></div>
</div>
</div>
<!-- Bento Grid Layout for Dashboard Items -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-lowest p-6 rounded-2xl h-40 flex flex-col justify-end">
<span class="material-symbols-outlined text-primary-container text-3xl mb-2" data-icon="groups">groups</span>
<span class="font-medium">यजमान</span>
</div>
<div class="bg-surface-container-lowest p-6 rounded-2xl h-40 flex flex-col justify-end">
<span class="material-symbols-outlined text-primary-container text-3xl mb-2" data-icon="calendar_month">calendar_month</span>
<span class="font-medium">पंचांग</span>
</div>
</div>
</main>
<!-- BottomNavBar Predicted Component -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-[#ffffff] shadow-[0px_-4px_16px_rgba(144,77,0,0.05)] rounded-t-3xl border-t border-[#ddc1ae]/20">
<div class="flex flex-col items-center justify-center bg-[#ff8c00]/10 text-[#904d00] rounded-2xl px-6 py-2">
<span class="material-symbols-outlined" data-icon="home" data-weight="fill" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="text-[14px] font-medium font-['Noto_Sans_Devanagari']">मुख्य पृष्ठ</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 px-6 py-2">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="text-[14px] font-medium font-['Noto_Sans_Devanagari']">यजमान</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 px-6 py-2">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="text-[14px] font-medium font-['Noto_Sans_Devanagari']">पंचांग</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 px-6 py-2">
<span class="material-symbols-outlined" data-icon="help_center">help_center</span>
<span class="text-[14px] font-medium font-['Noto_Sans_Devanagari']">सहायता</span>
</div>
</nav>
</div>
</body></html>
