<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden border-2 border-primary-container">
<img alt="Pandit Ji Profile Avatar" class="w-full h-full object-cover" data-alt="Close up portrait of an elderly Indian priest" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdU8RpxrSJPnPeZ1whZP3r6UA4oZ6r7Au9lWz_kkme2qb3LkDeFEbH-jNxSNvtXyn0SvO5dMf6Olsl9o8wspeancBEQx2UraQ6AhVfJjkTwOwAzt08vI16QBgkvssGwsCQ_xSRZLaZyYGOr24E7ZBzh0JAWK4n1DFFwaKYS3IXX86QJM90jRL5jNvqwt5_-o0HfYqd_iA8Bq5V82KZojwWmTXOdZL029HWAFayv_1Rqrn7DZrfydgp9FLaoh7Yce_9ZNiAWpMkVCmw"/>
</div>
<h1 class="font-headline text-2xl font-bold leading-[150%] text-[#904d00] dark:text-[#ff8c00]">सुप्रभातम्</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#f5f2ea] transition-colors">
<span class="material-symbols-outlined text-primary">notifications</span>
</button>
</header>
<main class="pt-24 pb-32 px-5 space-y-10">
<!-- Asymmetric Ritual Entry Cards (Simulating E-02 Progress) -->
<section class="space-y-6">
<div class="bg-surface-container-lowest rounded-xl p-6 shadow-sm border-l-4 border-primary">
<h2 class="font-headline text-xl font-bold mb-2">आज के यजमान</h2>
<div class="space-y-4">
<div class="flex items-center gap-4 p-4 bg-surface-container-low rounded-lg">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container">person</span>
</div>
<div>
<p class="font-bold text-lg">राजेश शर्मा</p>
<p class="text-on-surface-variant text-sm">गणेश पूजन - सुबह 9:00 बजे</p>
</div>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-highest/30 p-6 rounded-2xl flex flex-col items-center justify-center text-center aspect-square">
<span class="material-symbols-outlined text-primary text-4xl mb-2">menu_book</span>
<p class="font-label font-medium">पूजा विधि</p>
</div>
<div class="bg-primary-container/10 p-6 rounded-2xl flex flex-col items-center justify-center text-center aspect-square border-2 border-dashed border-primary-container/30">
<span class="material-symbols-outlined text-primary text-4xl mb-2">add_circle</span>
<p class="font-label font-medium">नई प्रविष्टि</p>
</div>
</div>
</section>

<div class="bg-surface-container-low p-8 rounded-3xl opacity-40">
<div class="h-4 w-3/4 bg-surface-variant rounded-full mb-4"></div>
<div class="h-4 w-1/2 bg-surface-variant rounded-full"></div>
</div>
</main>
<!-- Overlay / Backdrop -->
<div class="fixed inset-0 bg-on-surface/20 backdrop-blur-[2px] z-[60]"></div>

<div class="fixed bottom-0 left-0 w-full z-[70] bg-surface-container-lowest rounded-t-[32px] shadow-[0px_-8px_32px_rgba(0,0,0,0.15)] flex flex-col" style="height: 128px;">
<!-- Drag Handle (Visual cue) -->
<div class="w-12 h-1.5 bg-surface-variant rounded-full self-center mt-3 mb-1"></div>
<div class="flex-1 px-6 flex items-start gap-4 py-2">
<!-- Saffron Save Icon -->
<div class="mt-1 flex items-center justify-center w-10 h-10 rounded-full bg-primary-container/10">
<span class="material-symbols-outlined text-primary font-bold" style="font-variation-settings: 'FILL' 1;">save</span>
</div>
<!-- Notice Content -->
<div class="flex-1">
<h3 class="font-label font-bold text-on-surface text-lg leading-tight">Aapka kaam save hota rahega</h3>
<p class="font-label text-on-surface-variant text-[15px] leading-[140%] mt-0.5">
                    Kisi bhi step par ruk sakte hain — wapas aane par wahan se shuru honge.
                </p>
</div>

<button class="mt-1 w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-outline text-xl">close</span>
</button>
</div>
<!-- Progress Footer Section -->
<div class="px-6 pb-4">
<div class="flex items-center justify-between mb-1.5">
<span class="text-[11px] font-medium text-outline uppercase tracking-wider">4 seconds mein apne aap band ho jaayega</span>
</div>
<!-- Progress Bar Container -->
<div class="h-1 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary-container progress-bar-fill"></div>
</div>
</div>
</div>
<!-- Background Decoration (Subtle Spiritual Touch) -->
<div class="fixed -bottom-20 -right-20 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-20 -left-20 w-64 h-64 bg-tertiary-container/5 rounded-full blur-3xl -z-10"></div>
