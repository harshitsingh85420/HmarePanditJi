<body class="bg-[#FFFDF7] font-body text-on-background min-h-screen flex flex-col items-center">
<!-- Top App Bar - Simplified for focused journey (No Nav Shell per rules) -->
<header class="flex justify-between items-center px-6 py-4 w-full max-w-screen-xl mx-auto sticky top-0 z-50">
<div class="font-headline italic text-2xl text-primary">Pandit Seva</div>
<div class="flex items-center gap-2 px-3 py-1 bg-surface-container-low rounded-full">
<span class="material-symbols-outlined text-primary text-sm">language</span>
<span class="text-xs font-medium uppercase tracking-wider text-on-surface-variant">Bhojpuri</span>
</div>
</header>
<main class="flex-1 w-full max-w-md px-8 pt-12 pb-24 flex flex-col items-center justify-center text-center">
<!-- Hero Element -->
<div class="relative mb-10 w-full flex flex-col items-center">
<!-- Decorative background element -->
<div class="absolute -top-10 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[180px] text-primary">temple_hindu</span>
</div>
<h1 class="font-headline text-7xl font-bold text-primary tracking-tight mb-2">भोजपुरी</h1>
<p class="text-on-surface-variant text-xl tracking-widest font-medium opacity-60">BHOJPURI</p>
<!-- Decorative Divider -->
<div class="mt-8 flex items-center justify-center gap-4 w-full">
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-outline-variant to-transparent"></div>
<span class="material-symbols-outlined text-primary/40" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent via-outline-variant to-transparent"></div>
</div>
</div>
<!-- Question -->
<div class="mb-12">
<h2 class="font-headline text-3xl font-bold text-on-surface leading-snug">क्या यही भाषा सही है?</h2>
</div>
<!-- Voice Status Bars -->
<div class="mb-16 flex flex-col items-center gap-4">
<div class="flex items-end justify-center h-12 gap-1 px-8 py-3 bg-surface-container-low rounded-full">
<div class="voice-bar h-4 opacity-40"></div>
<div class="voice-bar h-8 opacity-60"></div>
<div class="voice-bar h-12"></div>
<div class="voice-bar h-6 opacity-80"></div>
<div class="voice-bar h-10 opacity-70"></div>
<div class="voice-bar h-3 opacity-30"></div>
</div>
<p class="text-primary font-medium tracking-wide">हाँ या नहीं बोलें</p>
</div>
<!-- Interaction Buttons -->
<div class="w-full space-y-5">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-bold text-xl rounded-xl sacred-glow transition-transform active:scale-95 flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                हाँ, यही भाषा चाहिए
            </button>
<button class="w-full h-14 bg-surface-variant text-on-surface-variant font-bold text-lg rounded-xl transition-transform active:scale-95 flex items-center justify-center gap-3">
<span class="material-symbols-outlined">restart_alt</span>
                नहीं, फिर से चुनूँगा
            </button>
