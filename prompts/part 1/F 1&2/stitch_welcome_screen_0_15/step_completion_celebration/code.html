<!DOCTYPE html>

<html class="light" lang="hi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Step Completion Celebration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&amp;family=Noto+Sans+Devanagari:wght@400;500;700&amp;family=Public+Sans:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-error-container": "#93000a",
              "primary-container": "#ff8c00",
              "background": "#fbf9f3",
              "on-secondary-fixed-variant": "#005312",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#88d982",
              "on-error": "#ffffff",
              "tertiary-fixed": "#ffdcbf",
              "inverse-primary": "#ffb77d",
              "primary-fixed": "#ffdcc3",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#ffb874",
              "surface-bright": "#fbf9f3",
              "on-primary-container": "#623200",
              "on-tertiary-fixed-variant": "#6a3b00",
              "on-primary-fixed-variant": "#6e3900",
              "secondary-container": "#a0f399",
              "on-secondary-fixed": "#002204",
              "surface-container": "#f0eee8",
              "error": "#ba1a1a",
              "tertiary-container": "#f89100",
              "surface-tint": "#904d00",
              "inverse-on-surface": "#f2f1eb",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "surface-variant": "#e4e2dd",
              "outline-variant": "#ddc1ae",
              "surface-container-low": "#f5f3ee",
              "surface-container-high": "#eae8e2",
              "on-tertiary-fixed": "#2d1600",
              "primary-fixed-dim": "#ffb77d",
              "secondary-fixed": "#a3f69c",
              "tertiary": "#8c5000",
              "surface": "#fbf9f3",
              "on-tertiary-container": "#5f3400",
              "primary": "#904d00",
              "on-primary-fixed": "#2f1500",
              "secondary": "#1b6d24",
              "on-secondary-container": "#217128",
              "on-background": "#1b1c19",
              "on-surface-variant": "#564334",
              "surface-dim": "#dbdad4",
              "surface-container-highest": "#e4e2dd",
              "outline": "#897362",
              "on-surface": "#1b1c19",
              "on-secondary": "#ffffff",
              "inverse-surface": "#30312d"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Noto Sans Devanagari", "Public Sans"],
              "label": ["Public Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .celebration-bg {
        background: radial-gradient(circle, rgba(255, 140, 0, 0.08) 0%, rgba(255, 255, 255, 1) 70%);
      }
      .glow-ring {
        box-shadow: 0 0 20px 4px rgba(255, 140, 0, 0.3);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- Celebration Overlay (State T-02) -->
<div class="fixed inset-0 z-[100] celebration-bg flex items-center justify-center p-8">
<div class="max-w-md w-full flex flex-col items-center text-center space-y-10">
<!-- Hero: Large Saffron Glowing Circle -->
<div class="relative">
<!-- Outer Glow -->
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-2xl transform scale-150"></div>
<!-- Main Circle -->
<div class="relative w-32 h-32 bg-primary-container rounded-full flex items-center justify-center shadow-[0px_8px_24px_rgba(144,77,0,0.25)] border-4 border-surface-container-lowest">
<span class="material-symbols-outlined text-surface-container-lowest text-6xl font-bold" style="font-variation-settings: 'wght' 700;">
                        check
                    </span>
</div>
</div>
<!-- Text Content -->
<div class="space-y-4">
<h1 class="font-headline text-3xl md:text-4xl text-primary font-bold leading-tight tracking-tight">
                    मोबाइल नंबर हो गया! 🙏
                </h1>
<p class="font-body italic text-lg text-on-surface-variant opacity-80">
                    Bahut achha, Pandit Ji.
                </p>
</div>
<!-- Progress Update Section -->
<div class="w-full max-w-xs pt-8">
<div class="flex items-center justify-between gap-3">
<!-- Pill 1: Completed -->
<div class="h-2.5 flex-1 bg-primary-container rounded-full"></div>
<!-- Pill 2: Completed -->
<div class="h-2.5 flex-1 bg-primary-container rounded-full"></div>
<!-- Pill 3: Newly Filled with Radiance Ring -->
<div class="relative h-2.5 flex-1 bg-primary-container rounded-full glow-ring ring-2 ring-primary-container ring-offset-2 ring-offset-surface"></div>
<!-- Pill 4: Pending -->
<div class="h-2.5 flex-1 bg-surface-variant rounded-full"></div>
<!-- Pill 5: Pending -->
<div class="h-2.5 flex-1 bg-surface-variant rounded-full"></div>
<!-- Pill 6: Pending -->
<div class="h-2.5 flex-1 bg-surface-variant rounded-full"></div>
</div>
<div class="mt-4 text-xs font-label uppercase tracking-widest text-outline">
                    Step 3 of 6 Complete
                </div>
</div>
</div>
</div>
<!-- Background Content (Simulated Profile Setup behind overlay) -->
<div class="opacity-10 pointer-events-none blur-sm">
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-[#fbf9f3]">
<div class="text-[#904d00] font-['Noto_Serif'] text-xl font-bold">सुप्रभातम</div>
<div class="w-10 h-10 rounded-full bg-surface-variant"></div>
</header>
<main class="pt-24 px-5 max-w-lg mx-auto space-y-8">
<div class="space-y-4">
<div class="h-8 w-48 bg-surface-variant rounded"></div>
<div class="h-14 w-full bg-surface-container-lowest rounded-xl shadow-sm"></div>
</div>
<div class="space-y-4">
<div class="h-8 w-32 bg-surface-variant rounded"></div>
<div class="h-14 w-full bg-surface-container-lowest rounded-xl shadow-sm"></div>
</div>
<div class="grid grid-cols-2 gap-4 pt-10">
<div class="h-14 bg-surface-variant rounded-xl"></div>
<div class="h-14 bg-primary-container rounded-xl"></div>
</div>
</main>
</div>
<!-- Decoration Layer (Abstract Saffron Shapes) -->
<div class="fixed top-0 right-0 -z-10 opacity-5">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="300" cy="100" fill="#ff8c00" r="150"></circle>
</svg>
</div>
</body></html>
