<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</helmet>
<span style="font-family:'Noto Sans Devanagari',sans-serif; font-weight:800; font-size:{{fs}}; color:{{col}}; letter-spacing:-.5px; white-space:nowrap; line-height:1;">{{ display }}</span>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:80},&quot;to&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:52400,&quot;tsType&quot;:&quot;number&quot;},&quot;prefix&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;₹&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;suffix&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:40,&quot;tsType&quot;:&quot;number&quot;},&quot;color&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#155C34&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;dur&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1500,&quot;tsType&quot;:&quot;number&quot;},&quot;delay&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:200,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  state = { val: 0 };
  componentDidMount(){
    const to = this.props.to ?? 0;
    const dur = this.props.dur ?? 1500;
    const delay = this.props.delay ?? 200;
    const start = performance.now() + delay;
    const tick = (now) => {
      const p = Math.max(0, Math.min(1, (now - start) / dur));
      const e = 1 - Math.pow(1 - p, 3);
      this.setState({ val: Math.round(to * e) });
      if (p < 1) this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
  }
  componentWillUnmount(){ if (this._raf) cancelAnimationFrame(this._raf); }
  renderVals(){
    const prefix = this.props.prefix ?? '₹';
    const suffix = this.props.suffix ?? '';
    return {
      display: prefix + this.state.val.toLocaleString('en-IN') + suffix,
      fs: (this.props.size ?? 40) + 'px',
      col: this.props.color ?? '#155C34',
    };
  }
}
</script>
</body>
</html>
