<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@keyframes dj-flicker { 0%,100%{ transform:translateX(-50%) scale(1) rotate(-2deg);} 50%{ transform:translateX(-50%) scale(1.09,1.14) rotate(2deg);} }
@keyframes dj-core { 0%,100%{ transform:translateX(-50%) scaleY(1); opacity:.85;} 50%{ transform:translateX(-50%) scaleY(1.18); opacity:1;} }
@keyframes dj-glow { 0%,100%{ opacity:.5; transform:translateX(-50%) scale(1);} 50%{ opacity:.92; transform:translateX(-50%) scale(1.2);} }
@media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
</style>
</helmet>
<div style="position:relative; width:64px; height:76px; display:inline-block; transform:scale({{scale}}); transform-origin:bottom center; font-family:'Noto Sans Devanagari',sans-serif;">
  <sc-if value="{{ lit }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute; bottom:20px; left:50%; width:80px; height:80px; border-radius:50%; background:radial-gradient(circle, rgba(242,160,44,.55) 0%, rgba(242,160,44,0) 68%); animation:dj-glow 1.9s ease-in-out infinite; pointer-events:none;"></div>
    <div style="position:absolute; bottom:30px; left:50%; width:18px; height:33px; border-radius:50% 50% 48% 48% / 62% 62% 40% 40%; background:linear-gradient(to top,#B23A1A 0%,#F2A02C 42%,#FFD98A 76%,#FFF6DE 100%); box-shadow:0 0 15px rgba(242,160,44,.85); transform:translateX(-50%); transform-origin:bottom center; animation:dj-flicker .95s ease-in-out infinite;"></div>
    <div style="position:absolute; bottom:31px; left:50%; width:7px; height:15px; border-radius:50%; background:linear-gradient(to top,#FFEFC4,#fff); transform:translateX(-50%); transform-origin:bottom center; animation:dj-core .95s ease-in-out infinite;"></div>
  </sc-if>
  <sc-if value="{{ unlit }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; bottom:31px; left:50%; width:5px; height:11px; border-radius:50%; background:#8A6F5C; transform:translateX(-50%);"></div>
  </sc-if>
  <div style="position:absolute; bottom:6px; left:50%; transform:translateX(-50%); width:58px; height:27px; background:linear-gradient(#F3CE74,#B8860B 58%,#7d5c0f); border-radius:6px 6px 42px 42px / 6px 6px 36px 36px; box-shadow:inset 0 3px 5px rgba(255,255,255,.45), 0 5px 9px rgba(90,46,32,.32);"></div>
  <div style="position:absolute; bottom:9px; left:calc(50% + 20px); width:16px; height:11px; background:linear-gradient(#F3CE74,#B8860B); border-radius:0 60% 62% 0; transform:rotate(-8deg);"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:120,&quot;height&quot;:130},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:44,&quot;tsType&quot;:&quot;number&quot;},&quot;lit&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const size = this.props.size ?? 44;
    const lit = this.props.lit ?? true;
    return { scale: size/58, lit, unlit: !lit };
  }
}
</script>
</body>
</html>
