<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@keyframes tn-sway { 0%,100%{ transform:rotate(-3deg);} 50%{ transform:rotate(3deg);} }
@media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
</style>
</helmet>
<div style="position:relative; width:100%; height:58px; overflow:visible;">
  <div style="position:absolute; top:6px; left:-4px; right:-4px; height:8px; background:linear-gradient(#9a4a1e,#5e1c0a); border-radius:0 0 50% 50% / 0 0 34px 34px; box-shadow:0 2px 4px rgba(0,0,0,.15);"></div>
  <div style="position:absolute; top:9px; left:0; right:0; display:flex; justify-content:space-around; align-items:flex-start; padding:0 4px;">
    <sc-for list="{{ strands }}" as="s" hint-placeholder-count="11">
      <div style="display:flex; flex-direction:column; align-items:center; gap:2px; transform-origin:top center; animation:tn-sway 3.4s ease-in-out infinite; animation-delay:{{ s.delay }};">
        <div style="width:3px; height:7px; background:#5f8a2a;"></div>
        <div style="width:22px; height:22px; border-radius:50%; background:radial-gradient(circle at 50% 38%, #FFDF9A 0%, #F2A02C 46%, #B23A1A 100%); box-shadow:inset 0 0 0 3px rgba(178,58,26,.28), 0 2px 3px rgba(0,0,0,.18);"></div>
        <sc-if value="{{ s.long }}" hint-placeholder-val="{{ false }}">
          <div style="width:17px; height:17px; border-radius:50%; background:radial-gradient(circle at 50% 38%, #FFE9B8 0%, #F2A02C 50%, #B23A1A 100%); box-shadow:inset 0 0 0 2px rgba(178,58,26,.28), 0 2px 3px rgba(0,0,0,.15);"></div>
          <div style="width:11px; height:8px; background:#4f7d22; border-radius:0 80% 0 80%; transform:rotate(8deg);"></div>
        </sc-if>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:90},&quot;count&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:11,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const n = this.props.count ?? 11;
    const strands = [];
    for (let i = 0; i < n; i++) strands.push({ delay: (-(i * 0.32)).toFixed(2) + 's', long: i % 3 === 1 });
    return { strands };
  }
}
</script>
</body>
</html>
