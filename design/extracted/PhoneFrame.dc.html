<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
</helmet>
<div style="width:378px; flex:0 0 auto; font-family:'Noto Sans Devanagari',sans-serif;">
  <div style="display:flex; align-items:center; gap:10px; margin-bottom:13px;">
    <span style="width:27px; height:27px; border-radius:50%; background:#B23A1A; color:#FFF6E9; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:0 0 auto;">{{ n }}</span>
    <span style="font-size:15px; font-weight:800; color:#7A250E;">{{ title }}</span>
  </div>
  <div style="width:378px; height:768px; background:#17110d; border-radius:42px; padding:11px; box-shadow:0 26px 64px rgba(52,26,19,.34), inset 0 0 0 2px #2b201a;">
    <div style="width:100%; height:100%; border-radius:32px; overflow:hidden; position:relative; background:{{ bg }}; display:flex; flex-direction:column;">
      <div style="height:34px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:3px 20px 0; z-index:9; color:{{ statusColor }};">
        <span style="font-size:13px; font-weight:800; letter-spacing:.3px;">8:24</span>
        <span style="display:flex; gap:6px; align-items:center;">
          <span style="font-family:'Material Symbols Outlined'; font-size:16px;">network_cell</span>
          <span style="font-family:'Material Symbols Outlined'; font-size:16px;">wifi</span>
          <span style="font-family:'Material Symbols Outlined'; font-size:18px;">battery_full</span>
        </span>
      </div>
      <div style="flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; min-height:0;">{{ children }}</div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:410,&quot;height&quot;:840},&quot;n&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;1&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;स्क्रीन&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;bg&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FFF9EE&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;statusColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#341A13&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals(){
    return {
      n: this.props.n ?? '',
      title: this.props.title ?? '',
      bg: this.props.bg ?? '#FFF9EE',
      statusColor: this.props.statusColor ?? '#341A13',
      children: this.props.children,
    };
  }
}
</script>
</body>
</html>
