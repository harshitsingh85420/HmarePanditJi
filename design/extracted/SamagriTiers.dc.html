<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@keyframes st-slide { 0%{ opacity:0; transform:translateX(22px);} 100%{ opacity:1; transform:translateX(0);} }
@media (prefers-reduced-motion: reduce){ *{ animation:none !important; } }
</style>
</helmet>
<div style="display:flex; flex-direction:column; gap:14px; font-family:'Noto Sans Devanagari',sans-serif;">
  <div style="display:flex; gap:8px;">
    <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="3">
      <button onClick="{{ t.onTap }}" style="flex:1; padding:11px 6px; border-radius:14px; cursor:pointer; border:2px solid {{ t.bd }}; background:{{ t.bg }}; color:{{ t.fg }}; font-family:'Noto Sans Devanagari',sans-serif; display:flex; flex-direction:column; align-items:center; gap:2px; transition:all .2s;" style-active="transform:scale(.97)">
        <span style="font-weight:800; font-size:16px;">{{ t.name }}</span>
        <span style="font-weight:700; font-size:13px; opacity:.85;">₹{{ t.price }}</span>
      </button>
    </sc-for>
  </div>
  <div style="display:flex; flex-direction:column; gap:9px;">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="4">
      <div style="display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:15px; background:{{ it.bg }}; border:1.5px solid {{ it.bd }}; opacity:{{ it.op }}; animation:{{ it.anim }};">
        <span style="font-size:23px; line-height:1;">{{ it.emoji }}</span>
        <div style="flex:1; display:flex; flex-direction:column; gap:2px; min-width:0;">
          <span style="font-size:16px; font-weight:700; color:{{ it.nameCol }};">{{ it.name }}</span>
          <span style="font-size:13px; color:#8A6F5C;">{{ it.meta }}</span>
        </div>
        <sc-if value="{{ it.showFrom }}" hint-placeholder-val="{{ false }}">
          <span style="font-size:11px; font-weight:700; color:#8A6F5C; background:#EFE8DA; padding:4px 9px; border-radius:999px; white-space:nowrap;">{{ it.fromTag }}</span>
        </sc-if>
        <sc-if value="{{ it.isNew }}" hint-placeholder-val="{{ false }}">
          <span style="font-size:11px; font-weight:800; color:#155C34; background:#D6EEDE; padding:4px 9px; border-radius:999px; white-space:nowrap;">नया</span>
        </sc-if>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:330,&quot;height&quot;:520},&quot;tier&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  state = { tier: this.props.tier ?? 2 };
  renderVals(){
    const t = this.state.tier;
    const tiers = [
      { name: 'बेसिक', price: '351', items: [
        { emoji: '🔶', name: 'रोली-चंदन', qty: '1 सेट', brand: '' },
        { emoji: '🪔', name: 'धूप-अगरबत्ती', qty: '2 पैकेट', brand: '' },
        { emoji: '🥥', name: 'नारियल', qty: '2 नग', brand: '' },
      ]},
      { name: 'स्टैंडर्ड', price: '651', items: [
        { emoji: '🔥', name: 'हवन सामग्री', qty: '500 ग्राम', brand: '' },
        { emoji: '🫙', name: 'देसी घी', qty: '250 ग्राम', brand: 'पतंजलि' },
      ]},
      { name: 'प्रीमियम', price: '1,100', items: [
        { emoji: '🪙', name: 'चाँदी का सिक्का', qty: '1 नग', brand: '' },
        { emoji: '🌸', name: 'केसर', qty: '2 ग्राम', brand: 'बाबा' },
        { emoji: '🌹', name: 'गुलाब जल', qty: '1 बोतल', brand: '' },
      ]},
    ];
    const tabs = tiers.map((ti, i) => ({
      name: ti.name, price: ti.price,
      bg: i === t ? '#B23A1A' : '#FFFDF8',
      fg: i === t ? '#FFF6E9' : '#7A250E',
      bd: i === t ? '#B23A1A' : '#F4B096',
      onTap: () => this.setState({ tier: i }),
    }));
    const items = [];
    for (let i = 0; i <= t; i++){
      const inherited = i < t;
      const isNew = i === t && t > 0;
      tiers[i].items.forEach(it => {
        items.push({
          emoji: it.emoji, name: it.name,
          meta: it.qty + (it.brand ? ' · ' + it.brand : ''),
          bg: inherited ? '#F4EFE6' : '#FFFDF8',
          bd: inherited ? '#E7DCC9' : (isNew ? '#BFE3CC' : '#EADFCE'),
          op: inherited ? '0.72' : '1',
          nameCol: inherited ? '#8A6F5C' : '#341A13',
          showFrom: inherited, fromTag: tiers[i].name + ' से',
          isNew,
          anim: isNew ? 'st-slide .4s ease-out' : 'none',
        });
      });
    }
    return { tabs, items };
  }
}
</script>
</body>
</html>
