name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests with coverage
        run: pnpm --filter @hmarepanditji/pandit test:coverage
        working-directory: ./apps/pandit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/pandit/coverage

      - name: Check coverage thresholds
        run: |
          cd apps/pandit
          node -e "
          const report = require('./coverage/coverage-final.json');
          const utils = report['./src/lib/utils.ts'];
          const mapper = report['./src/lib/number-mapper.ts'];
          
          const utilsLines = utils.lines.pct;
          const mapperLines = mapper.lines.pct;
          
          console.log('utils.ts line coverage:', utilsLines + '%');
          console.log('number-mapper.ts line coverage:', mapperLines + '%');
          
          if (utilsLines < 80 || mapperLines < 80) {
            console.error('Coverage below 80% threshold!');
            process.exit(1);
          }
          console.log('Coverage thresholds met!');
          "

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
        working-directory: ./apps/pandit

      - name: Run E2E tests
        run: pnpm exec playwright test
        working-directory: ./apps/pandit

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/pandit/e2e/results/

      - name: Upload failed screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-screenshots
          path: apps/pandit/e2e/results/screenshots/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Run linter
        run: pnpm --filter @hmarepanditji/pandit lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Run TypeScript check
        run: pnpm --filter @hmarepanditji/pandit tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, lint, type-check]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm --filter @hmarepanditji/pandit build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: apps/pandit/.next/
