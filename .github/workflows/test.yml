name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @hmarepanditji/pandit test:coverage
        working-directory: ./apps/pandit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/pandit/coverage

      # Coverage thresholds (global + the per-file utils.ts / number-mapper.ts
      # bars) are enforced by vitest itself via apps/pandit/vitest.config.ts, so
      # `test:coverage` above already fails this job on a shortfall. The check
      # that used to live here read coverage-final.json expecting
      # coverage-summary.json's shape and threw a TypeError on every run — it
      # could not pass even at 100% coverage. Moving it into the config means it
      # also fails on a developer's machine, not only in CI.

  e2e-tests:
    # INFORMATIONAL: the Playwright suite needs a LIVE stack (running app +
    # API + DB) which CI does not have — playwright.config has no webServer
    # and baseURL defaults to localhost:3002. Until CI gets a real stack this
    # job cannot pass, and a permanently-red REQUIRED gate teaches everyone
    # to ignore CI (the decorative-guard failure mode). It still runs and
    # uploads reports, but does not block.
    name: E2E Tests (informational — needs live stack)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
        working-directory: ./apps/pandit

      - name: Run E2E tests
        run: pnpm exec playwright test
        working-directory: ./apps/pandit

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/pandit/e2e/results/

      - name: Upload failed screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-screenshots
          path: apps/pandit/e2e/results/screenshots/

  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm --filter @hmarepanditji/pandit lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm --filter @hmarepanditji/pandit tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    # e2e is informational (see above) — the REAL gates are unit-tests, lint,
    # type-check. Keeping an unpassable job in `needs` would permanently skip
    # this build and hide real regressions behind a fake red.
    needs: [unit-tests, lint, type-check]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm --filter @hmarepanditji/pandit build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: apps/pandit/.next/
