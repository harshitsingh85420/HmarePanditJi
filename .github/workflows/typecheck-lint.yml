name: TypeScript & ESLint Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Generate Prisma client
        run: pnpm db:generate
      
      - name: Run TypeScript check (Pandit App)
        run: pnpm --filter @hmarepanditji/pandit tsc --noEmit
        continue-on-error: false
      
      - name: Run TypeScript check (Admin App)
        run: pnpm --filter @hmarepanditji/admin tsc --noEmit
        continue-on-error: false
      
      - name: Run TypeScript check (Web App)
        run: pnpm --filter @hmarepanditji/web tsc --noEmit
        continue-on-error: false
      
      - name: Upload TypeScript errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-errors
          path: |
            apps/pandit/ts_errors.txt
            apps/admin/ts_errors.txt
            apps/web/ts_errors.txt

  eslint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint check (Pandit App)
        run: pnpm --filter @hmarepanditji/pandit lint
        continue-on-error: false
      
      - name: Run ESLint check (Admin App)
        run: pnpm --filter @hmarepanditji/admin lint
        continue-on-error: false
      
      - name: Run ESLint check (Web App)
        run: pnpm --filter @hmarepanditji/web lint
        continue-on-error: false
      
      - name: Upload ESLint errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-errors
          path: |
            apps/pandit/eslint_errors.txt
            apps/admin/eslint_errors.txt
            apps/web/eslint_errors.txt

  build-check:
    runs-on: ubuntu-latest
    needs: [typescript-check, eslint-check]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Generate Prisma client
        run: pnpm db:generate
      
      - name: Build Pandit App
        run: pnpm --filter @hmarepanditji/pandit build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
          NODE_ENV: production
      
      - name: Analyze bundle size
        run: |
          cd apps/pandit
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/ >> $GITHUB_STEP_SUMMARY
          du -sh .next/server/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: apps/pandit/.next/
          retention-days: 7

  preview-deployment:
    runs-on: ubuntu-latest
    needs: [build-check]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Generate Prisma client
        run: pnpm db:generate
      
      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        id: deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PANDIT_PROJECT_ID }}
          working-directory: ./apps/pandit
          vercel-args: '--env=preview'
      
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Preview deployment ready: ${{ steps.deploy.outputs.url }}'
            })
