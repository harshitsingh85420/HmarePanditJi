name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# contents:write so the on-failure step can post the log as a commit comment
# (the default token is read-only — the first failure comment silently 403'd).
permissions:
  contents: write

# THE canonical test gate. Every step is a REAL, locally-reproducible check —
# per-package steps so a red run names the culprit in the step name itself
# (the old monolithic `pnpm test` failed without saying which package broke).
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hmarepanditji_test
          POSTGRES_USER: hpj_user
          POSTGRES_PASSWORD: hpj_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hpj_user:hpj_test_password@localhost:5432/hmarepanditji_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test_jwt_secret_64_chars_minimum_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_64_chars_minimum_xxxxxxxxxxxxxxxxxxxx
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate

      # Schema into the service container so any test that ever queries has a
      # real database (today's guards are grep/pure — this future-proofs).
      - name: Push Prisma schema to test Postgres
        run: pnpm --filter db exec prisma db push --skip-generate

      # Guards import runtime modules (booking.service → @hmarepanditji/db),
      # so the WORKSPACE deps must be BUILT — on a fresh runner there is no
      # dist/ and resolution fails with MODULE_NOT_FOUND (the exact Linux-only
      # failure: local machines had stale dist folders masking it).
      - name: Build API workspace dependencies
        run: pnpm --filter "@hmarepanditji/api^..." build

      - name: Pandit unit tests (vitest — coverage thresholds enforced by config)
        run: pnpm --filter @hmarepanditji/pandit test:coverage

      - name: API guard suite (build-failing money/security guards)
        run: pnpm --filter @hmarepanditji/api test 2>&1 | tee /tmp/api-guards.log
        shell: bash

      - name: Search-service tests (jest)
        run: pnpm --filter @hmarepanditji/search-service test 2>&1 | tee /tmp/search-tests.log
        shell: bash

      # CONFORMANCE — "the documentation is followed" as a build status.
      # Runs AFTER the suites on purpose: the suites prove the behaviour,
      # this proves every documented requirement is actually claimed by
      # one of them (or by a manual script, or by a SIGNED deviation).
      # A requirement nobody claims fails the build.
      - name: Register projection is in sync with the register
        run: node scripts/gen-requirements.mjs --check

      - name: Conformance guard (every requirement discharged)
        run: node scripts/conformance-guard.mjs 2>&1 | tee /tmp/conformance.log
        shell: bash

      # Failure logs → a commit comment (readable via the PUBLIC API), so a
      # token-less local agent can self-serve the failing guard's output
      # instead of guessing from a red ✗.
      - name: Surface failure log as commit comment
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let body = '## CI test-job failure log (auto-posted)\n';
            for (const f of ['/tmp/api-guards.log', '/tmp/search-tests.log']) {
              try {
                const t = fs.readFileSync(f, 'utf8');
                const tail = t.split('\n').slice(-80).join('\n');
                body += `\n<details><summary>${f}</summary>\n\n\`\`\`\n${tail}\n\`\`\`\n</details>\n`;
              } catch {}
            }
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint (Pandit)
        run: pnpm --filter @hmarepanditji/pandit lint
      - name: Lint (Admin)
        run: pnpm --filter @hmarepanditji/admin lint
      - name: Lint (Web)
        run: pnpm --filter @hmarepanditji/web lint
